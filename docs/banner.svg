<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="LeanType Chirp banner">
  <title>LeanType Chirp banner</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B0F19"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)" rx="12"/>

  <g transform="translate(80,40)">
