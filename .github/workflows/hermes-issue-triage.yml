name: hermes-issue-triage
on:
  issues:
    types: [opened]

jobs:
  triage:
    if: github.actor != 'dependabot[bot]' && github.actor != 'hermes-agent[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Hermes Gateway
        env:
          HERMES_SECRET: ${{ secrets.HERMES_WEBHOOK_SECRET_ISSUES }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_HTML_URL: ${{ github.event.issue.html_url }}
          REPO_FULL_NAME: ${{ github.repository }}
          SENDER_LOGIN: ${{ github.actor }}
        run: |
          HERMES_TS="$(date +%s)"
          BODY=$(jq -n \
            --argjson number "$ISSUE_NUMBER" \
            --arg title "$ISSUE_TITLE" \
            --arg html_url "$ISSUE_HTML_URL" \
            --arg full_name "$REPO_FULL_NAME" \
            --arg login "$SENDER_LOGIN" \
            '{
              action: "created",
              issue: { number: $number, title: $title, html_url: $html_url },
              repository: { full_name: $full_name },
              sender: { login: $login }
            }')
          HERMES_SIG="$(printf '%s.%s' "$HERMES_TS" "$BODY" | openssl dgst -sha256 -hmac "$HERMES_SECRET" | awk '{print $2}')"
          curl -s -X POST \
            "https://hermes-gw.everydayworkflows.com/webhooks/github-issues" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: issues" \
            -H "X-Hermes-Signature: $HERMES_SIG" \
            -H "X-Hermes-Timestamp: $HERMES_TS" \
            -d "$BODY"
